<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200" role="img" aria-label="Castellan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="16" fill="url(#bg)"/>
  <!-- shield emblem -->
  <g transform="translate(70,40)">
    <path d="M60 0 L120 22 L120 70 C120 110 95 130 60 145 C25 130 0 110 0 70 L0 22 Z"
          fill="#334155" stroke="#38bdf8" stroke-width="3"/>
    <!-- crenellated keep -->
    <g fill="#38bdf8">
      <rect x="30" y="48" width="10" height="14"/>
      <rect x="48" y="48" width="10" height="14"/>
      <rect x="66" y="48" width="10" height="14"/>
      <rect x="84" y="48" width="10" height="14"/>
      <rect x="30" y="60" width="64" height="44"/>
    </g>
    <rect x="55" y="78" width="14" height="26" fill="#0f172a"/>
  </g>
  <!-- wordmark -->
  <text x="240" y="95" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#f1f5f9" letter-spacing="2">Castellan</text>
  <text x="242" y="135" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="24" fill="#94a3b8">Agentless hardening of Ubuntu and Debian servers</text>
  <text x="242" y="166" font-family="Consolas, Menlo, monospace"
        font-size="17" fill="#38bdf8">one command to audit, one to apply</text>
</svg>
