---
# Test-only inventory for the disposable podman target (Approach A).
#
# Used by overriding Ansible's inventory for the run, e.g.:
#   ANSIBLE_INVENTORY=test/inventory.yml ./harden apply 127.0.0.1
# (see test/run.sh). It never replaces the real inventory/hosts.yml.
#
# All values are test fixtures: the private key path points at a gitignored,
# disposable container key, so there is no real secret here.
all:
  children:
    vps:
      hosts:
        127.0.0.1:
          # Initial contact (matches the Containerfile: root, key-only, :2222).
          target_ip: 127.0.0.1
          connection_mode: root_key
          initial_user: root
          initial_port: 2222
          ansible_ssh_private_key_file: test/secrets/id_test

          # Admin identity to create and then verify.
          admin_user: castellan
          admin_pubkey_file: test/secrets/id_test.pub
          sudo_mode: nopasswd

          # Keep SSH on 22 inside the container: the published mapping is
          # 2222->22, so changing the port would need a new mapping. Revisit
          # when the ssh role lands (see test/README.md).
          ssh_port: 22
          ssh_allow_groups: [ssh-users]
