---
# ssh (audit) - read-only checks on the EFFECTIVE sshd config (sshd -T).
# Reports deviations mapped to docs/security-measures.md section 2.

- name: "Ssh | Dump the effective sshd configuration"
  ansible.builtin.command: /usr/sbin/sshd -T
  register: _ssh_effective
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Ssh | Report compliance"
  ansible.builtin.debug:
    msg:
      - >-
        2.1 password auth disabled:
        {{ 'ok' if ('passwordauthentication no' in (_ssh_effective.stdout | default(''))) else 'FAIL' }}
      - >-
        2.2 root login disabled:
        {{ 'ok' if ('permitrootlogin no' in (_ssh_effective.stdout | default(''))) else 'FAIL' }}
      - >-
        2.5 access restricted by group:
        {{ 'ok' if ('allowgroups ' in (_ssh_effective.stdout | default(''))) else 'FAIL' }}
      - >-
        2.4 keyboard-interactive disabled:
        {{ 'ok' if ('kbdinteractiveauthentication no' in (_ssh_effective.stdout | default(''))) else 'FAIL' }}
      - >-
        2.12 strong host-key algorithms:
        {{ 'ok' if (('ssh-ed25519' in (_ssh_effective.stdout | default(''))) and ('ssh-dss' not in (_ssh_effective.stdout | default('')))) else 'FAIL' }}
      - >-
        2.6 configured port (sshd_config view):
        {{ (_ssh_effective.stdout_lines | default([]) | select('match', '^port ') | list | first | default('port ?')).split()[1] }}
      - >-
        2.14 pre-auth banner:
        {{ 'ok' if ('banner /etc/issue.net' in (_ssh_effective.stdout | default(''))) else ('FAIL' if ssh_banner else 'off') }}
      - >-
        2.17 address family:
        {{ (_ssh_effective.stdout_lines | default([]) | select('match', '^addressfamily ') | list | first | default('addressfamily any')).split()[1] }}
      - >-
        3.2 FIDO2 keys accepted:
        {{ 'ok' if ('sk-ssh-ed25519@openssh.com' in (_ssh_effective.stdout | default(''))) else ('FAIL' if ssh_allow_fido2 else 'off') }}
