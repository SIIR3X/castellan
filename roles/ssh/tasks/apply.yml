---
# ssh (apply) - harden sshd via a validated drop-in, reload once at play end.
#
# Anti-lockout: this runs only after Play 2 confirmed key+sudo access for the
# admin, after the firewall already allowed the SSH port, and AllowGroups always
# contains the admin's group. The config is validated (sshd -t) before being put
# in place, and applied with a RELOAD (not restart) flushed at the very end.

- name: "Ssh | Back up sshd configuration before changes"
  ansible.builtin.include_role:
    name: backup_config
    tasks_from: file
  vars:
    backup_config_file: "{{ item }}"
  loop:
    - /etc/ssh/sshd_config
    - /etc/ssh/sshd_config.d/00-castellan-hardening.conf

- name: "Ssh | Write the pre-auth banner (2.14)"
  ansible.builtin.copy:
    dest: /etc/issue.net
    content: "{{ ssh_banner_text }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ssh_banner | bool

- name: "Ssh | Deploy the hardening drop-in (validated)"
  ansible.builtin.template:
    src: 00-castellan-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/00-castellan-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: "Ssh | Reload sshd"

- name: "Ssh | Enforce strict permissions on sshd_config (2.19)"
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
  become: true

# --- 2.18 - remove weak/legacy host keys (ed25519 + rsa are kept) ---
- name: "Ssh | Remove weak host keys (2.18)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_dsa_key.pub
  become: true
  when: ssh_remove_weak_host_keys | bool
  notify: "Ssh | Reload sshd"

# --- 2.6 - change the listening port. The port lives in sshd_config (Port). On
# a socket-activated sshd (Ubuntu 24.04) the sshd-socket-generator reads that
# Port and configures ssh.socket on the next daemon-reload; on a direct
# sshd.service (Debian, older Ubuntu) sshd uses it as-is. Editing ssh.socket by
# hand is wrong: a bare "ListenStream=<port>" binds IPv6-only and the generator
# overrides any manual drop-in whenever sshd_config changes -> lockout.
#
# Detect whether ssh.socket exists so the handler only restarts it where present.
- name: "Ssh | Detect the ssh.socket unit (2.6)"
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/ssh.socket
  register: _ssh_socket_unit
  become: true

# Remove any legacy ssh.socket port drop-in from older Castellan versions; the
# generator now owns the socket via sshd_config Port.
- name: "Ssh | Remove the legacy ssh.socket port drop-in (2.6)"
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d/10-castellan-port.conf
    state: absent
  become: true
  notify: "Ssh | Apply ssh port change"

# Only set Port when actually moving off the default 22: a live port change is
# disruptive (do it deliberately; reverting needs a connection on the new port).
# The new port is already open in ufw (firewall runs first), so no lockout.
- name: "Ssh | Set the listening port via sshd_config (2.6)"
  ansible.builtin.template:
    src: sshd-port.conf.j2
    dest: /etc/ssh/sshd_config.d/10-castellan-port.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  when: ssh_port | int != 22
  notify: "Ssh | Apply ssh port change"
