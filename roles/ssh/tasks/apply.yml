---
# ssh (apply) - harden sshd via a validated drop-in, reload once at play end.
#
# Anti-lockout: this runs only after Play 2 confirmed key+sudo access for the
# admin, after the firewall already allowed the SSH port, and AllowGroups always
# contains the admin's group. The config is validated (sshd -t) before being put
# in place, and applied with a RELOAD (not restart) flushed at the very end.

- name: "Ssh | Back up sshd configuration before changes"
  ansible.builtin.include_role:
    name: backup_config
    tasks_from: file
  vars:
    backup_config_file: "{{ item }}"
  loop:
    - /etc/ssh/sshd_config
    - /etc/ssh/sshd_config.d/00-castellan-hardening.conf

- name: "Ssh | Deploy the hardening drop-in (validated)"
  ansible.builtin.template:
    src: 00-castellan-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/00-castellan-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: "Ssh | Reload sshd"

- name: "Ssh | Enforce strict permissions on sshd_config (2.19)"
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
  become: true

# --- 2.18 - remove weak/legacy host keys (ed25519 + rsa are kept) ---
- name: "Ssh | Remove weak host keys (2.18)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_dsa_key.pub
  become: true
  when: ssh_remove_weak_host_keys | bool
  notify: "Ssh | Reload sshd"

# --- 2.6 - change the listening port. On Ubuntu sshd is socket-activated, so
# the port is owned by ssh.socket (not sshd_config); manage a socket drop-in.
# Detection: service_facts does NOT list .socket units, so stat the unit file. ---
- name: "Ssh | Detect the ssh.socket unit (2.6)"
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/ssh.socket
  register: _ssh_socket_unit
  become: true

# Only touch the socket when actually moving off the default port 22: this keeps
# normal runs from churning ssh.socket, and a live port change is disruptive
# (do it deliberately; reverting needs a connection on the new port).
- name: "Ssh | Ensure the ssh.socket drop-in directory exists (2.6)"
  ansible.builtin.file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when:
    - _ssh_socket_unit.stat.exists
    - ssh_port | int != 22

- name: "Ssh | Set the listening port via ssh.socket (2.6)"
  ansible.builtin.template:
    src: ssh-socket-port.conf.j2
    dest: /etc/systemd/system/ssh.socket.d/10-castellan-port.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - _ssh_socket_unit.stat.exists
    - ssh_port | int != 22
  notify: "Ssh | Apply ssh.socket port change"
