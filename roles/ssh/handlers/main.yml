---
# Reload (not restart) keeps existing sessions alive. Flushed at the end of the
# harden play, so sshd is reloaded ONCE after every change is in place.
- name: "Ssh | Reload sshd"
  ansible.builtin.service:
    name: ssh
    state: reloaded
  become: true

# Apply a changed listening port (2.6). daemon-reload re-runs the
# sshd-socket-generator (Ubuntu 24.04) so ssh.socket picks up the new Port from
# sshd_config; the socket (where present) and the service are then restarted to
# rebind. The new port is already open in ufw (firewall runs first), so no
# lockout. All steps share one 'listen' topic and run in definition order.
- name: "Ssh | Reload systemd units"
  ansible.builtin.systemd_service:
    daemon_reload: true
  become: true
  listen: "Ssh | Apply ssh port change"

# Skipped on systems without socket activation (e.g. Debian direct sshd.service).
- name: "Ssh | Restart the ssh.socket unit"
  ansible.builtin.systemd_service:
    name: ssh.socket
    state: restarted
  become: true
  when: _ssh_socket_unit.stat.exists | default(false)
  listen: "Ssh | Apply ssh port change"

- name: "Ssh | Restart the ssh service to rebind the port"
  ansible.builtin.systemd_service:
    name: ssh
    state: restarted
  become: true
  listen: "Ssh | Apply ssh port change"
