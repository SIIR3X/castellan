---
# firewall - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only status checks; apply -> configure and enable ufw.

- name: "Firewall | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "Firewall | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
