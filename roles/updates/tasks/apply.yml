---
# updates (apply) - patch the system and enable automatic security updates.

- name: "Updates | Ensure unattended-upgrades is installed"
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: "Updates | Apply all pending updates (6.1)"
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  become: true
  when: updates_full_upgrade | bool

- name: "Updates | Back up apt periodic configuration before changes"
  ansible.builtin.include_role:
    name: backup_config
    tasks_from: file
  vars:
    backup_config_file: "{{ item }}"
  loop:
    - /etc/apt/apt.conf.d/20auto-upgrades
    - /etc/apt/apt.conf.d/52castellan-unattended-upgrades

- name: "Updates | Enable periodic security updates (6.2)"
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  become: true

- name: "Updates | Configure auto-reboot and cleanup (6.4/6.5)"
  ansible.builtin.template:
    src: 52castellan-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/52castellan-unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  become: true

- name: "Updates | Enable the apt timers"
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  become: true
