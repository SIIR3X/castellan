---
# compliance - run Lynis and collect a timestamped report (section 18).
# Read-only on the target; the report is rendered/fetched to the control machine.

- name: "Compliance | Compute the report timestamp"
  ansible.builtin.set_fact:
    compliance_stamp: "{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
  when: compliance_stamp is not defined

- name: "Compliance | Compute the local report path"
  ansible.builtin.set_fact:
    compliance_local_path: "{{ playbook_dir }}/../{{ compliance_report_dir }}/{{ inventory_hostname }}_{{ compliance_stamp }}"

- name: "Compliance | Ensure Lynis is installed"
  ansible.builtin.apt:
    name: lynis
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: compliance_lynis_install | bool

- name: "Compliance | Run the Lynis system audit (18.1)"
  ansible.builtin.command: lynis audit system --quiet --no-colors
  register: _compliance_run
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Compliance | Read the Lynis report data"
  ansible.builtin.slurp:
    src: /var/log/lynis-report.dat
  register: _compliance_dat
  become: true

- name: "Compliance | Extract the hardening index"
  ansible.builtin.set_fact:
    compliance_hardening_index: >-
      {{ (_compliance_dat.content | b64decode
          | regex_findall('hardening_index=([0-9]+)') or ['unknown']) | first }}

- name: "Compliance | Gather service facts (18.4)"
  ansible.builtin.service_facts:
  become: true

- name: "Compliance | Read ufw status (oneshot service, check rules not state)"
  ansible.builtin.command: ufw status
  register: _compliance_ufw
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

# --- 18.6 - document the applied state on the target (apply mode only) ---
- name: "Compliance | Ensure the Castellan state directory exists (18.6)"
  ansible.builtin.file:
    path: /etc/castellan
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: castellan_mode | default('apply') != 'audit'

- name: "Compliance | Record the applied hardening state (18.6)"
  ansible.builtin.template:
    src: applied-state.yml.j2
    dest: /etc/castellan/applied-state.yml
    owner: root
    group: root
    mode: "0644"
  become: true
  when: castellan_mode | default('apply') != 'audit'

# --- 18.5 - alert on security events (SSH logins), apply mode only -----------
- name: "Compliance | Security-event alerting (18.5)"
  when:
    - compliance_alerting | bool
    - castellan_mode | default('apply') != 'audit'
  block:
    - name: "Compliance | Deploy the notification script (18.5)"
      ansible.builtin.template:
        src: castellan-notify.sh.j2
        dest: /usr/local/sbin/castellan-notify
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: "Compliance | Back up the sshd PAM stack before the hook (18.5)"
      ansible.builtin.include_role:
        name: backup_config
        tasks_from: file
      vars:
        backup_config_file: /etc/pam.d/sshd

    - name: "Compliance | Hook the notifier into the sshd PAM session (18.5)"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/sshd
        line: "session optional pam_exec.so seteuid /usr/local/sbin/castellan-notify"
        insertafter: EOF
        state: present
      become: true

# --- 18.2 - schedule a periodic re-audit to detect drift (apply mode only) ---
- name: "Compliance | Locate the lynis binary (18.2)"
  ansible.builtin.command: command -v lynis
  register: _compliance_lynis_bin_raw
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Compliance | Set the lynis binary path (18.2)"
  ansible.builtin.set_fact:
    _compliance_lynis_bin: "{{ _compliance_lynis_bin_raw.stdout | default('/usr/sbin/lynis') | trim }}"

- name: "Compliance | Install the periodic re-audit timer (18.2)"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item | basename | regex_replace('\\.j2$', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - castellan-lynis.service.j2
    - castellan-lynis.timer.j2
  become: true
  when:
    - compliance_periodic_audit | bool
    - castellan_mode | default('apply') != 'audit'

- name: "Compliance | Enable the periodic re-audit timer (18.2)"
  ansible.builtin.systemd_service:
    name: castellan-lynis.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when:
    - compliance_periodic_audit | bool
    - castellan_mode | default('apply') != 'audit'

- name: "Compliance | Create the local report directory"
  ansible.builtin.file:
    path: "{{ compliance_local_path }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: "Compliance | Fetch the Lynis report files (18.3)"
  ansible.builtin.fetch:
    src: "{{ item }}"
    dest: "{{ compliance_local_path }}/"
    flat: true
  loop:
    - /var/log/lynis.log
    - /var/log/lynis-report.dat
  become: true
  when: compliance_fetch | bool

- name: "Compliance | Render the local summary (18.3/18.4)"
  ansible.builtin.template:
    src: summary.md.j2
    dest: "{{ compliance_local_path }}/summary.md"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: "Compliance | Show the hardening index"
  ansible.builtin.debug:
    msg: >-
      [compliance] Lynis hardening index = {{ compliance_hardening_index }};
      report saved under {{ compliance_report_dir }}/{{ inventory_hostname }}_{{ compliance_stamp }}/
