---
# fail2ban - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only status checks; apply -> configure and enable fail2ban.

- name: "Fail2ban | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "Fail2ban | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
