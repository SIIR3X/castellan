---
# pam - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only policy checks; apply -> enforce password policy + lockout.

- name: "PAM | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "PAM | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
