---
# filesystem (apply) - harden temp mounts and sensitive file perms (section 9).
# fstab is backed up first so rollback can restore it. Mount changes apply now
# (ansible.posix.mount state=mounted) and persist via fstab.

- name: "Filesystem | Back up /etc/fstab before changes"
  ansible.builtin.include_role:
    name: backup_config
    tasks_from: file
  vars:
    backup_config_file: /etc/fstab

# --- 9.7 Strict permissions on sensitive files (CRIT) ------------------------
- name: "Filesystem | Enforce permissions on sensitive files (9.7)"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
    state: file
  become: true
  loop: "{{ filesystem_sensitive_files }}"
  loop_control:
    label: "{{ item.path }}"

# --- 9.1 Harden /tmp ---------------------------------------------------------
- name: "Filesystem | Mount /tmp as a hardened tmpfs (9.1)"
  ansible.posix.mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: "{{ filesystem_tmp_opts }}"
    state: mounted
  become: true
  when: filesystem_harden_tmp | bool

# --- 9.2 Harden /dev/shm and (opt-in) /var/tmp -------------------------------
- name: "Filesystem | Harden /dev/shm mount options (9.2)"
  ansible.posix.mount:
    path: /dev/shm
    src: tmpfs
    fstype: tmpfs
    opts: "{{ filesystem_dev_shm_opts }}"
    state: mounted
  become: true
  when: filesystem_harden_dev_shm | bool

- name: "Filesystem | Mount /var/tmp as a hardened tmpfs (9.2)"
  ansible.posix.mount:
    path: /var/tmp
    src: tmpfs
    fstype: tmpfs
    opts: "{{ filesystem_tmp_opts }}"
    state: mounted
  become: true
  when: filesystem_harden_var_tmp | bool

# --- 9.3 Harden /home (only when it is a separate mount) ---------------------
- name: "Filesystem | Locate /home as a separate mount (9.3)"
  ansible.builtin.set_fact:
    _filesystem_home: "{{ ansible_mounts | default([]) | selectattr('mount', 'equalto', '/home') | list | first | default({}) }}"
  when: filesystem_harden_home | bool

- name: "Filesystem | Add nosuid,nodev to /home (9.3)"
  ansible.posix.mount:
    path: /home
    src: "{{ _filesystem_home.device }}"
    fstype: "{{ _filesystem_home.fstype }}"
    opts: "{{ ((_filesystem_home.options | default('defaults')).split(',') + ['nosuid', 'nodev']) | unique | join(',') }}"
    state: mounted
  become: true
  when:
    - filesystem_harden_home | bool
    - _filesystem_home.device is defined

# --- 9.9 Disable USB mass-storage automount ---------------------------------
- name: "Filesystem | Blacklist USB mass-storage modules (9.9)"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/castellan-usb.conf
    content: |
      # Managed by Castellan (9.9) - disable USB mass-storage automount.
      {% for m in filesystem_usb_modules %}
      install {{ m }} /bin/true
      blacklist {{ m }}
      {% endfor %}
    owner: root
    group: root
    mode: "0644"
  become: true
  when: filesystem_disable_usb | bool

# --- 9.10 Disk quotas (opt-in, advanced) ------------------------------------
- name: "Filesystem | Quota tooling and enablement (9.10)"
  when: filesystem_enable_quotas | bool
  block:
    - name: "Filesystem | Install quota tools (9.10)"
      ansible.builtin.apt:
        name: quota
        state: present
        install_recommends: false
      become: true

    - name: "Filesystem | Locate the quota mount (9.10)"
      ansible.builtin.set_fact:
        _filesystem_q: "{{ ansible_mounts | default([]) | selectattr('mount', 'equalto', filesystem_quota_mount) | list | first | default({}) }}"

    - name: "Filesystem | Enable usrquota/grpquota on the mount (9.10)"
      ansible.posix.mount:
        path: "{{ filesystem_quota_mount }}"
        src: "{{ _filesystem_q.device }}"
        fstype: "{{ _filesystem_q.fstype }}"
        opts: "{{ ((_filesystem_q.options | default('defaults')).split(',') + ['usrquota', 'grpquota']) | unique | join(',') }}"
        state: mounted
      become: true
      when: _filesystem_q.device is defined

    - name: "Filesystem | Turn on quotas for the mount (9.10)"
      ansible.builtin.command: "quotaon -ug {{ filesystem_quota_mount }}"
      become: true
      register: _filesystem_quotaon
      changed_when: "'already on' not in (_filesystem_quotaon.stderr | default(''))"
      failed_when: false
      when: _filesystem_q.device is defined

# --- 9.4 / 9.5 / 9.6 Targeted remediation (opt-in lists; default no-op) ------
- name: "Filesystem | Strip SUID/SGID bit from listed binaries (9.4)"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-s,g-s"
  become: true
  loop: "{{ filesystem_suid_strip }}"

- name: "Filesystem | Remove world-write from listed paths (9.5)"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "o-w"
  become: true
  loop: "{{ filesystem_world_writable_fix }}"

- name: "Filesystem | Chown listed unowned paths to root (9.6)"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
  become: true
  loop: "{{ filesystem_unowned_chown }}"
