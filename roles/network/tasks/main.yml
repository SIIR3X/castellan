---
# network - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only checks; apply -> blacklist protocols + harden DNS.

- name: "Network | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "Network | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
