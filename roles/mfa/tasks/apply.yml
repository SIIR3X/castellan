---
# mfa (apply) - TOTP 2FA on SSH (section 3). Anti-lockout by construction:
# AuthenticationMethods always requires the key as well (a code alone is never
# enough), pam_google_authenticator runs with nullok (un-enrolled users keep
# key-only access), and the admin/automation account is exempted from the 2nd
# factor. The sshd drop-in is validated before it is placed and reloaded once,
# at the end of the play, via the shared "Ssh | Reload sshd" handler.

- name: "Mfa | Require the ssh role for a safe MFA rollout"
  ansible.builtin.assert:
    that:
      - enable_ssh | default(true) | bool
    fail_msg: >-
      mfa needs the ssh role (enable_ssh) to flip KbdInteractiveAuthentication on
      and to own the single end-of-play sshd reload. Enable ssh or disable mfa.
    quiet: true

# --- 3.1 TOTP package --------------------------------------------------------
# install_recommends:false keeps an MTA (and other recommends) off the box.
- name: "Mfa | Install libpam-google-authenticator (3.1)"
  ansible.builtin.apt:
    name: libpam-google-authenticator
    state: present
    install_recommends: false
  become: true

# --- Back up the files we are about to edit ----------------------------------
- name: "Mfa | Back up the sshd PAM stack and drop-in before changes"
  ansible.builtin.include_role:
    name: backup_config
    tasks_from: file
  vars:
    backup_config_file: "{{ item }}"
  loop:
    - /etc/pam.d/sshd
    - /etc/ssh/sshd_config.d/20-castellan-mfa.conf

# --- 3.1 Wire TOTP into the sshd PAM auth stack ------------------------------
# With common-auth commented (below), pam_google_authenticator is the only auth
# module. Under nullok it returns PAM_IGNORE for a user without a token, and a
# stack where every module is ignored DENIES access - which would lock out any
# non-exempt user who has not enrolled yet. pam_permit.so provides the success
# fallback so un-enrolled users keep key-only access (soft rollout); an ENROLLED
# user who types a wrong code is still denied because the required GA module
# fails before pam_permit runs. pam_permit is added ONLY under nullok; without
# nullok an un-enrolled user must be denied, so no fallback is wanted.
- name: "Mfa | Require TOTP in the sshd PAM stack (3.1)"
  ansible.builtin.blockinfile:
    path: /etc/pam.d/sshd
    marker: "# {mark} CASTELLAN MFA (3.1)"
    insertbefore: BOF
    block: |-
      auth required pam_google_authenticator.so{{ ' nullok' if mfa_pam_nullok | bool else '' }}
      {% if mfa_pam_nullok | bool %}auth required pam_permit.so{% endif %}
  become: true

# common-auth (pam_unix) would demand a password during keyboard-interactive and
# fail when the user types a TOTP code instead, so it is commented out for sshd.
# Password login is already off (ssh role), and the admin uses key-only auth.
- name: "Mfa | Disable password auth (common-auth) in the sshd PAM stack (3.1)"
  ansible.builtin.replace:
    path: /etc/pam.d/sshd
    regexp: '^(@include\s+common-auth)\s*$'
    replace: '# \1  # Castellan MFA: TOTP-only keyboard-interactive (3.1)'
  become: true

# --- 3.4 Force key + TOTP via an sshd drop-in --------------------------------
- name: "Mfa | Deploy the MFA sshd drop-in (validated) (3.4)"
  ansible.builtin.template:
    src: 20-castellan-mfa.conf.j2
    dest: /etc/ssh/sshd_config.d/20-castellan-mfa.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: "Ssh | Reload sshd"
