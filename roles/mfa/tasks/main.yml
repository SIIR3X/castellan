---
# mfa - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only checks; apply -> TOTP package + PAM + sshd drop-in.

- name: "Mfa | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "Mfa | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
