---
# backup_config (per file).
#
# Backs up a single remote file into the run backup directory BEFORE it is
# modified, preserving its full path so rollback can restore it unambiguously.
# Every call is also recorded in the run MANIFEST as "<path>|<existed>", so
# rollback can restore modified files AND remove files hardening newly created.
# Required var: backup_config_file (absolute path on the target).

- name: "Backup config | Require the 'backup_config_file' variable"
  ansible.builtin.assert:
    that:
      - backup_config_file is defined
      - backup_config_file | length > 0
    fail_msg: "backup_config/file requires the 'backup_config_file' variable."
    quiet: true

- name: "Backup config | Resolve the run backup directory"
  ansible.builtin.set_fact:
    _backup_config_run_dir: "{{ castellan_backup_dir }}/{{ backup_config_stamp | default('manual') }}"

- name: "Backup config | Ensure the run backup directory exists"
  ansible.builtin.file:
    path: "{{ _backup_config_run_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: "Backup config | Stat {{ backup_config_file }}"
  ansible.builtin.stat:
    path: "{{ backup_config_file }}"
  register: _backup_config_stat
  become: true

- name: "Backup config | Record the manifest entry for {{ backup_config_file }}"
  ansible.builtin.lineinfile:
    path: "{{ _backup_config_run_dir }}/MANIFEST"
    line: "{{ backup_config_file }}|{{ _backup_config_stat.stat.exists }}"
    create: true
    owner: root
    group: root
    mode: "0600"
  become: true

- name: "Backup config | Ensure the backup parent directory exists"
  ansible.builtin.file:
    path: "{{ (_backup_config_run_dir ~ '/' ~ (backup_config_file | regex_replace('^/', ''))) | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  when: _backup_config_stat.stat.exists

- name: "Backup config | Back up {{ backup_config_file }}"
  ansible.builtin.copy:
    src: "{{ backup_config_file }}"
    dest: "{{ _backup_config_run_dir }}/{{ backup_config_file | regex_replace('^/', '') }}"
    remote_src: true
    mode: preserve
  become: true
  when: _backup_config_stat.stat.exists
