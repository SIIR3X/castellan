---
# integrity - dispatch on castellan_mode (see docs/architecture.md section 4).
# audit -> read-only checks; apply -> install AIDE/debsums + build baseline.

- name: "Integrity | Run audit checks"
  ansible.builtin.include_tasks: audit.yml
  when: castellan_mode | default('apply') == 'audit'

- name: "Integrity | Apply remediation"
  ansible.builtin.include_tasks: apply.yml
  when: castellan_mode | default('apply') != 'audit'
