---
# services (audit) - read-only inventory mapped to section 10; no changes.

- name: "Services | Read status of legacy network packages (10.1)"
  ansible.builtin.command: "dpkg-query -W -f='${Package} ${Status}\n' {{ services_unwanted_packages | join(' ') }}"
  register: _svc_unwanted
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Services | Gather service facts (10.2)"
  ansible.builtin.service_facts:
  become: true

- name: "Services | List listening sockets (10.3)"
  ansible.builtin.command: ss -tulpnH
  register: _svc_ports
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Services | Check whether postfix is installed (10.4)"
  ansible.builtin.command: dpkg-query -W -f='${Status}' postfix
  register: _svc_postfix
  changed_when: false
  failed_when: false
  check_mode: false
  become: true

- name: "Services | Read postfix listening interfaces (10.4)"
  ansible.builtin.command: postconf -h inet_interfaces
  register: _svc_postfix_inet
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  when: "'install ok installed' in (_svc_postfix.stdout | default(''))"

- name: "Services | Simulate orphaned-package cleanup (10.7)"
  ansible.builtin.command: apt-get -s autoremove  # noqa: command-instead-of-module
  register: _svc_autoremove
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  environment:
    LANG: C

- name: "Services | Report section 10 compliance"
  ansible.builtin.debug:
    msg:
      - >-
        10.1 no legacy network packages installed:
        {{ 'ok' if 'install ok installed' not in (_svc_unwanted.stdout | default('')) else 'FAIL (some present)' }}
      - >-
        10.2 unused services not present/enabled:
        {{ 'ok' if (_svc_disable_present | length) == 0 else ('review: ' ~ (_svc_disable_present | join(', '))) }}
      - >-
        10.4 postfix loopback-only:
        {{ ('ok' if (_svc_postfix_inet.stdout | default('') | trim) in ['loopback-only', 'localhost']
            else 'FAIL')
           if 'install ok installed' in (_svc_postfix.stdout | default('')) else 'skipped (no postfix)' }}
      - >-
        10.7 no orphaned packages:
        {{ 'ok' if ' 0 to remove' in (_svc_autoremove.stdout | default('')) else 'review (autoremove has candidates)' }}
      - "10.3 listening sockets (manual review):"
  vars:
    _svc_disable_present: >-
      {{ services_disable
         | select('in', (ansible_facts.services.keys() | map('regex_replace', '\.service$', '') | list))
         | list }}

- name: "Services | Report listening sockets (10.3)"
  ansible.builtin.debug:
    msg: "{{ _svc_ports.stdout_lines | default([]) }}"
