---
# Castellan inventory.
#
# Every target server lives under the "vps" group. Add one entry per host
# (use its IP or FQDN). Per-host settings go in inventory/host_vars/<host>.yml
# (see docs/config.md and inventory/host_vars.example.yml).
#
# The ./harden init <host> command creates the per-host file for you, but you
# still add the host below so Ansible knows about it.
#
# Example:
#   all:
#     children:
#       vps:
#         hosts:
#           203.0.113.42:

all:
  children:
    vps:
      hosts: {}
