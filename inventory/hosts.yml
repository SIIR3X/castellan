---
# NOTE: this static inventory is no longer the active one.
#
# Castellan now uses a DYNAMIC inventory (inventory/castellan-inventory.sh, set
# in ansible.cfg): every inventory/host_vars/<host>.yml is automatically exposed
# as a host in the 'vps' group. Create a host with `./harden init <host>` and it
# appears without editing any inventory file.
#
# Kept only as documentation of the group layout.
all:
  children:
    vps:
      hosts: {}
