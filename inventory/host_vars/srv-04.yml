---
# Castellan per-host configuration for srv-04 (generated by ./harden init).

target_ip:        192.168.1.43
connection_mode:  user_sudo
initial_user:     lucas
initial_port:     22

admin_user:        castellan
admin_pubkey_file: /home/lucas/.ssh/id_ed25519.pub
sudo_mode:         nopasswd

ssh_port:          2222
ssh_allow_groups:  [ssh-users]
ufw_allowed_ports: []
f2b_ignoreip:      []
auto_reboot:       false

# >>> castellan: profile & measures (managed by ./harden configure) >>>
hardening_profile: paranoid
enable_integrity: true
enable_boot: true
accounts_max_logins: 10
accounts_remove_unused: true
audit_logging_immutable: true
boot_disable_ctrl_alt_del: true
boot_harden_kernel_cmdline: true
compliance_alerting: true
filesystem_disable_usb: true
filesystem_enable_quotas: true
filesystem_harden_home: true
filesystem_harden_var_tmp: true
integrity_clamav: true
integrity_rkhunter: true
network_disable_wireless: true
network_egress_filter: true
services_disable_ipv6: true
services_mask: true
services_remove_compilers: true
ssh_address_family: "inet"
ssh_allow_fido2: true
ssh_banner: true
sysctl_disable_module_load: true
sysctl_disable_userns: true
sysctl_restrict_perf: true
ufw_block_icmp_echo: true
updates_pending_alert: true
# <<< castellan <<<
