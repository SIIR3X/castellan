---
# Play 3 - Harden.
#
# Applies all hardening roles as the new admin, in the mandatory anti-lockout
# order: firewall -> fail2ban -> ssh -> everything else. sshd is reloaded ONCE,
# through a handler flushed at the very end. See docs/architecture.md (section 3).
- name: "Castellan | Play 3 - Harden"
  hosts: vps
  gather_facts: true
  become: true
  vars:
    ansible_user: "{{ admin_user }}"
    ansible_port: "{{ initial_port | default(22) }}"

  pre_tasks:
    - name: "Harden | Announce run parameters"
      ansible.builtin.debug:
        msg: >-
          [harden] mode={{ castellan_mode | default('apply') }},
          profile={{ hardening_profile | default('standard') }}.
          Roles run in lockout-safe order.

  roles:
    # Lockout-critical first. Each role reads castellan_mode to switch between
    # audit (read-only) and apply.
    - role: firewall      # open the SSH port BEFORE enabling ufw
      when: enable_firewall | default(true)
      tags: [firewall]

    - role: fail2ban      # ignoreip = your IP, before any ban can hit you
      when: enable_fail2ban | default(true)
      tags: [fail2ban]

    - role: ssh           # disable root/password, harden crypto (reload at end)
      when: enable_ssh | default(true)
      tags: [ssh]

    - role: accounts      # account lockdown (lock root LAST, post-verify)
      when: enable_accounts | default(true)
      vars:
        accounts_stage: harden
      tags: [accounts]

    - role: updates       # patch + enable unattended security updates
      when: enable_updates | default(true)
      tags: [updates]

    - role: sysctl        # kernel/network/filesystem tunables (no lockout path)
      when: enable_sysctl | default(true)
      tags: [sysctl]

    # TODO next: low-risk roles
    #   - pam, confinement, filesystem, services,
    #     audit_logging, integrity, network, cron, boot

  post_tasks:
    # Flush handlers explicitly so sshd is reloaded ONCE, after every role's
    # change is in place (anti-lockout: never reload sshd mid-play).
    - name: "Harden | Reload services once, at the very end"
      ansible.builtin.meta: flush_handlers
