---
# Play 2 - Verify access (SAFETY NET).
#
# Reconnects as the NEW admin user (key-based) and confirms that sudo works.
# If this play fails in apply mode, hardening stops here and the original
# root/password access is still intact - no lockout. See docs/architecture.md
# (section 3).
#
# In audit mode the admin may not exist yet (no apply has run), so a failure is
# downgraded to a notice and the host is skipped for this play only; the later
# read-only audit play still runs.
- name: "Castellan | Play 2 - Verify new admin access"
  hosts: vps
  gather_facts: false
  vars:
    # New admin account. On a first apply the ssh role has not changed the port
    # yet, so this is still the initial port; on a re-run against an already
    # hardened host Play 0 reports the hardened port. Falls back to the initial
    # port when preflight did not run.
    ansible_user: "{{ admin_user }}"
    ansible_port: "{{ castellan_verify_port | default(initial_port | default(22)) }}"

  tasks:
    # Tagged 'always' so the access safety net runs even on a targeted
    # --tags/--only run, before any role touches the host.
    - name: "Verify access | Reconnect as the new admin and confirm sudo"
      tags: [always]
      block:
        - name: "Verify access | Confirm SSH login as '{{ admin_user }}'"
          ansible.builtin.ping:
          register: _verify_ping
          ignore_unreachable: true

        - name: "Verify access | Assert the host is reachable as the admin"
          ansible.builtin.assert:
            that:
              - _verify_ping.unreachable is not defined or not _verify_ping.unreachable
            fail_msg: "Cannot open an SSH session as '{{ admin_user }}'."
            quiet: true

        - name: "Verify access | Run a sudo smoke test (id -u)"
          ansible.builtin.command: id -u
          become: true
          changed_when: false
          check_mode: false
          register: _verify_uid

        - name: "Verify access | Assert sudo escalated to root (uid 0)"
          ansible.builtin.assert:
            that:
              - (_verify_uid.stdout | trim) == '0'
            fail_msg: "sudo did not escalate to root for '{{ admin_user }}'."
            success_msg: "OK: '{{ admin_user }}' can log in and use sudo."
            quiet: true

      rescue:
        - name: "Verify access | Abort: new access is not usable (apply mode)"
          ansible.builtin.fail:
            msg: >-
              Could not reconnect as '{{ admin_user }}' with working sudo.
              Aborting before any destructive change; the original root/password
              access is still intact (no lockout).
          when: castellan_mode | default('apply') != 'audit'

        - name: "Verify access | Notice: admin not reachable yet (audit mode)"
          ansible.builtin.debug:
            msg: >-
              [audit] '{{ admin_user }}' is not reachable with sudo yet. Run
              './harden apply' to create it. Skipping this host for Play 2 only.
          when: castellan_mode | default('apply') == 'audit'

        - name: "Verify access | Skip this host for the rest of Play 2"
          ansible.builtin.meta: end_host
          when: castellan_mode | default('apply') == 'audit'
