# Castellan - Ansible configuration.
# Applies to every invocation made from the repository root (via ./harden).

[defaults]
# Inventory and roles locations (repository-relative). The dynamic inventory
# exposes every inventory/host_vars/<host>.yml as a host in the 'vps' group, so
# adding a host never requires editing a static inventory file.
inventory               = inventory/castellan-inventory.sh
roles_path              = roles

# Do not scatter *.retry files across the repo.
retry_files_enabled     = False

# Let Ansible pick the remote Python interpreter without warning
# (Ubuntu/Debian ship Python 3 by default).
interpreter_python      = auto_silent

# Readable, diff-friendly output.
stdout_callback         = yaml
force_color             = True
nocows                  = True

# Fail fast on undefined variables and keep deprecation warnings visible.
error_on_undefined_vars = True
deprecation_warnings    = True

[privilege_escalation]
# Roles decide when to escalate; we never assume become globally.
become        = False
become_method = sudo

[ssh_connection]
# Reuse a single SSH connection per host for speed.
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new

# Retry transient SSH connection failures.
retries = 2
